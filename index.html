<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ألعاب مازن احمد</title>
    <style>
        /* ألوان هادية واحترافية */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            color: #ffffff; 
            text-align: center; 
            margin: 0;
            padding: 20px; 
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 { color: #00d4ff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .card {
            background: #252525;
            border-radius: 15px;
            padding: 30px;
            border-top: 5px solid #00d4ff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-title { font-size: 24px; color: #ffcc00; margin-bottom: 10px; }
        
        .status-box {
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            color: #00ff88;
            border: 1px dashed #555;
        }

        .btn {
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px #00d4ff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>موقع العاب مازن احمد</h1>
        <p>مرحباً بكم في معرض مشروعاتي البرمجية</p>

        <div class="card">
            <div class="game-title">لعبة City Car Driving</div>
            
            <div class="status-box">
                متاح الآن للتحميل مجاناً
            </div>

            <p>استمتع بتجربة قيادة واقعية ومثيرة في شوارع المدينة.</p>
            
            <br>
<a href="https://www.downloadpcgames6.com/2019/03/city-car-driving.html?m=1" class="btn" target="_blank">اضغط هنا للتحميل</a>
        </div>
        
        <p style="margin-top: 40px; font-size: 12px; color: #666;">
            تم البرمجة بواسطة مازن أحمد - مبرمج واعد
        </p>
    </div>

</body>
</html>
